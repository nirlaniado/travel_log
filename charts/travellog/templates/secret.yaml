{{- if not .Values.secrets -}}
{{- fail "secrets.* is not set — copy charts/travellog/secrets.yaml.example to secrets.yaml, fill in real values, and install with -f secrets.yaml" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "travellog.fullname" . }}-secrets
  labels:
    {{- include "travellog.labels" . | nindent 4 }}
type: Opaque
stringData:
  MYSQL_USER: {{ .Values.secrets.mysqlUser | quote }}
  MYSQL_PASSWORD: {{ .Values.secrets.mysqlPassword | quote }}
  MYSQL_ROOT_PASSWORD: {{ .Values.secrets.mysqlRootPassword | quote }}
  DATABASE_URL: "mysql+pymysql://{{ .Values.secrets.mysqlUser }}:{{ .Values.secrets.mysqlPassword }}@{{ include "travellog.fullname" . }}-mysql:{{ .Values.mysql.port }}/{{ .Values.mysql.database }}"

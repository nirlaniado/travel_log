apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "travellog.fullname" . }}-backend-config
  labels:
    {{- include "travellog.labels" . | nindent 4 }}
data:
  SESSION_COOKIE_NAME: {{ .Values.backend.env.sessionCookieName | quote }}
  SESSION_LIFETIME_HOURS: {{ .Values.backend.env.sessionLifetimeHours | quote }}
  COOKIE_SECURE: {{ .Values.backend.env.cookieSecure | quote }}
  CORS_ORIGINS: {{ .Values.backend.env.corsOrigins | quote }}
  LOGIN_MAX_FAILED_ATTEMPTS: {{ .Values.backend.env.loginMaxFailedAttempts | quote }}
  LOGIN_FAILURE_WINDOW_MINUTES: {{ .Values.backend.env.loginFailureWindowMinutes | quote }}
  LOGIN_LOCKOUT_MINUTES: {{ .Values.backend.env.loginLockoutMinutes | quote }}

# CI — runs on every push, any branch. Validates the code; never deploys
# anything (that's cd.yml / deploy-eks.yml, main-only). See
# .claude/levels/level-08-ci-lint-test.md and level-09-ci-build-images.md.
#
# `changes` gates every other job on whether backend/ or frontend/ actually
# changed, so e.g. a docs-only or infra-only push doesn't spin up 5 runners
# to lint/test code that didn't move. deploy-eks.yml (workflow_run on this
# workflow) relies on this workflow's overall conclusion being "success"
# even when everything below was skipped.
name: ci

on:
  push:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend-lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt
        working-directory: backend

      - run: ruff check .
        working-directory: backend

  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: backend
        run: pytest -q

  frontend-lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run lint
        working-directory: frontend

  frontend-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run test
        working-directory: frontend

  frontend-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (includes tsc typecheck)
        working-directory: frontend
        run: npm run build

  build-images:
    runs-on: ubuntu-latest
    needs: [changes, backend-lint, backend-test, frontend-lint, frontend-test, frontend-build]
    # `needs` jobs that were skipped (nothing changed in their path) still
    # count as "not failure" here — only a real failure/cancellation blocks
    # this job. Without `always()`, a skipped dependency would skip this too.
    if: |
      always() &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        if: needs.changes.outputs.backend == 'true'
        run: docker build -t travellog/backend:ci ./backend

      - name: Build frontend image
        if: needs.changes.outputs.frontend == 'true'
        run: docker build -t travellog/frontend:ci --build-arg VITE_API_URL=/api ./frontend
